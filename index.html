<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio – Hamid Boukrouna</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #020817; /* fond très sombre */
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .hero {
        text-align: center;
      }

      .hero-tag {
        letter-spacing: 0.3em;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: #22e4c9;
        margin-bottom: 1.5rem;
      }

      .hero-title {
        font-size: 5rem;
        font-weight: 800;
        margin: 0 0 1.5rem 0;
        font-family: 'Lobster', cursive;
      }

      .hero-subtitle {
        font-size: 1rem;
        color: #9ca3af;
        max-width: 480px;
        margin: 0 auto 2.5rem auto;
        line-height: 1.6;
      }

      .hero-button {
        padding: 0.9rem 2.5rem;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background-color: #14f4bf;
        color: #020617;
        transition: transform 120ms ease, box-shadow 120ms ease,
          filter 120ms ease;
      }

      .hero-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(20, 244, 191, 0.35);
        filter: brightness(1.05);
      }
    </style>
  </head>

  <body>
    <main class="hero">
      <div class="hero-tag">Portfolio</div>

      <h1 class="hero-title">Hamid Boukrouna</h1>

      <p class="hero-subtitle">
        Développeur frontend en formation, passionné par le web moderne.
      </p>

      <button class="hero-button">Voir mes projets</button>
    </main>
  </body>
</html>
